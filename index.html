<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Client Launcher</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 380px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px #00c6ff;
  text-align: center;
  z-index: 2;
}

h1 {
  text-shadow: 0 0 10px #00c6ff;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  box-shadow: 0 0 12px #00c6ff;
}

button:hover {
  transform: scale(1.05);
}

.motd {
  margin: 10px 0;
  font-size: 13px;
  opacity: 0.85;
}

.fullscreen {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.5);
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 10px #00c6ff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="fullscreen" onclick="toggleFullscreen()">⛶</div>

<div class="container">
  <h1>🎮 Pixel Client</h1>

  <div class="motd" id="motd"></div>

  <button onclick="launch('PixelClient_1.8.8.html')">
    ▶ Play 1.8.8
  </button>

  <button onclick="launch('PixelClient_1.12.2.html')">
    ▶ Play 1.12.2
  </button>
</div>

<script>
/* ================= 365 MOTD + JOKES (CURATED) ================= */

const motdBase = [
  "Welcome to Pixel Client",
  "Stay sharp and play hard",
  "Today is a perfect day to game",
  "Pixel power activated",
  "Grinding never felt so good",
  "Keep your aim steady",
  "Rise and dominate",
  "Lag? Not here",
  "Time to build something great",
  "Game smarter, not harder"
];

const jokes = [
  "Why did the creeper go to therapy? 💥",
  "I tried to mine... ended up mining my patience 😂",
  "Why don’t skeletons lie? They’d fall apart 💀",
  "What’s a zombie’s favorite food? Brain-freeze 🧠",
  "Why was the player broke? Too many diamonds lost 💎",
  "Lag is just part of the adventure 😅",
  "I fell in lava… again 🔥",
  "That moment when you miss a jump 😭",
  "Villagers are secretly rich 🏡",
  "Never trust gravel… EVER 😤"
];

/* Generate 365 unique combinations */
let daily = [];

for (let i = 0; i < 365; i++) {
  const m = motdBase[i % motdBase.length];
  const j = jokes[i % jokes.length];

  daily.push(`💬 Day ${i+1}: ${m} | 😆 ${j}`);
}

/* Deterministic daily selection */
function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function loadMOTD() {
  const day = getDayOfYear();
  const index = day % daily.length;
  document.getElementById("motd").innerText = daily[index];
}

/* ================= LAUNCH ================= */
function launch(file) {
  window.location.href = file;
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* ================= PARTICLES ================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5),
    vy: (Math.random() - 0.5),
    size: Math.random() * 2
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#00c6ff";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00c6ff";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

loadMOTD();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Client Launcher</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  overflow: hidden;
}

/* Canvas background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* MAIN PANEL */
.container {
  position: relative;
  z-index: 2;
  width: 380px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px #00c6ff;
  text-align: center;
}

h1 {
  text-shadow: 0 0 10px #00c6ff;
}

/* BUTTONS */
button {
  width: 90%;
  padding: 12px;
  margin: 10px auto;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  box-shadow: 0 0 10px #00c6ff;
}

button:hover {
  transform: scale(1.05);
}

/* VERSION ICONS */
.versionBtn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.icon {
  width: 24px;
  height: 24px;
  background: #00c6ff;
  border-radius: 4px;
  box-shadow: 0 0 8px #00c6ff;
}

/* MOTD */
.motd {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}

/* FULLSCREEN BUTTON */
.fullscreen {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 5;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(0,0,0,0.5);
  cursor: pointer;
  box-shadow: 0 0 10px #00c6ff;
}

/* CHLOG + WELCOME */
#popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.popupBox {
  width: 350px;
  padding: 20px;
  background: #0f172a;
  border-radius: 15px;
  box-shadow: 0 0 20px #00c6ff;
}

.popupBox h2 {
  text-align: center;
}

.popupBox p {
  font-size: 14px;
}

/* LOGIN */
#login {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(2,6,23,0.95);
  z-index: 6;
}

.loginBox {
  width: 300px;
  padding: 30px;
  text-align: center;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 20px #00c6ff;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}
</style>
</head>

<body>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div style="
position:fixed;
bottom:15px;
left:15px;
z-index:5;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #00c6ff;">
  🔊 <input type="range" min="0" max="1" step="0.01" value="0.5" id="volume">
</div>
<canvas id="bg"></canvas>

<!-- FULLSCREEN -->
<div class="fullscreen" onclick="toggleFullscreen()">⛶</div>

<!-- LOGIN -->
<div id="login">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- MAIN -->
<div class="container" id="main" style="display:none;">
  <h1>🎮 Pixel Client</h1>

  <div class="motd" id="motd"></div>

  <button class="versionBtn" onclick="launch('PixelClient_1.8.8.html')">
    <div class="icon"></div> Play 1.8.8
  </button>

  <button class="versionBtn" onclick="launch('PixelClient_1.12.2.html')">
    <div class="icon"></div> Play 1.12.2
  </button>
</div>

<!-- POPUPS -->
<div id="popup">
  <div class="popupBox">
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
/* ===== ACCOUNT SAVE ===== */
function login() {
  const name = document.getElementById("user").value;
  if (!name) return;

  localStorage.setItem("username", name);
  document.getElementById("login").style.display = "none";

  document.getElementById("main").style.display = "block";

  showWelcome();
  loadMOTD();
}

/* ===== WELCOME / CHLOG ===== */
function showWelcome() {
  if (!localStorage.getItem("seen")) {
    openPopup("Welcome!", "Thanks for using Pixel Client!");
    localStorage.setItem("seen", "true");
  } else {
    openPopup("Changelog", "- Added launcher\n- UI improvements\n- Performance fixes");
  }
}
const music = document.getElementById("bgMusic");
const volume = document.getElementById("volume");

music.volume = 0.5;

// Start music after user interaction (browser requirement)
document.body.addEventListener("click", () => {
  music.play().catch(() => {});
}, { once: true });

volume.addEventListener("input", () => {
  music.volume = volume.value;
});
  
function openPopup(title, text) {
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* ===== MOTD ===== */
function loadMOTD() {
  const messages = [
    "🔥 New update available!",
    "🎮 Have fun playing!",
    "⚡ Optimized performance!",
    "🌌 Enjoy the neon launcher!"
  ];
  document.getElementById("motd").innerText =
    "💬 " + messages[Math.floor(Math.random() * messages.length)];
}

/* ===== FULLSCREEN ===== */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* ===== LAUNCH ===== */
function launch(file) {
  window.location.href = file;
}

/* ===== PARTICLES ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5),
    vy: (Math.random() - 0.5),
    size: Math.random() * 2
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#00c6ff";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00c6ff";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
